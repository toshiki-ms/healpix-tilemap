<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEALPix Tile Map Viewer</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell" data-split="single" aria-label="HEALPix tile map viewer">
      <section id="paneGrid" class="pane-grid" data-split="single" aria-label="map panes">
        <div class="viewer-pane is-active" data-pane-id="left" data-view="net">
          <canvas id="mapCanvas" class="map-canvas" aria-label="Left HEALPix map"></canvas>
          <canvas id="globeCanvas" class="globe-canvas" aria-label="Left HEALPix globe"></canvas>
          <span class="pane-label">Left</span>
        </div>
        <div class="viewer-pane" data-pane-id="right" data-view="net">
          <canvas id="rightMapCanvas" class="map-canvas" aria-label="Right HEALPix map"></canvas>
          <canvas id="rightGlobeCanvas" class="globe-canvas" aria-label="Right HEALPix globe"></canvas>
          <span class="pane-label">Right</span>
        </div>
      </section>

      <section class="toolbar" aria-label="viewer controls">
        <div class="brand">
          <h1>HEALPix Tile Map</h1>
          <span id="datasetStatus">Loading dataset</span>
        </div>

        <label>
          Split
          <select id="splitModeSelect">
            <option value="single">Single</option>
            <option value="vertical">Left / Right</option>
            <option value="horizontal">Top / Bottom</option>
          </select>
        </label>

        <label>
          Pane
          <select id="paneSelect">
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </label>

        <label>
          Dataset
          <select id="datasetSelect"></select>
        </label>

        <label>
          View
          <select id="viewMode">
            <option value="net">2D net</option>
            <option value="globe">3D globe</option>
          </select>
        </label>

        <label>
          Layer
          <select id="layerSelect"></select>
        </label>

        <label id="timeSelectorField" class="selector-field" hidden>
          <span id="timeSelectorLabel">Time</span>
          <select id="timeSelect"></select>
        </label>

        <label id="levelSelectorField" class="selector-field" hidden>
          <span id="levelSelectorLabel">Level</span>
          <select id="levelSelect"></select>
        </label>

        <label>
          Max order
          <select id="orderSelect"></select>
        </label>

        <label>
          Colormap
          <select id="colormapSelect">
            <option value="viridis">Viridis</option>
            <option value="magma">Magma</option>
            <option value="turbo">Turbo</option>
            <option value="balance">Balance</option>
          </select>
        </label>

        <label>
          Scale
          <select id="scaleSelect">
            <option value="linear">Linear</option>
            <option value="symlog">Symlog</option>
            <option value="log">Log</option>
          </select>
        </label>

        <label class="number-field">
          Min
          <input id="minInput" type="number" step="0.01" />
        </label>

        <label class="number-field">
          Max
          <input id="maxInput" type="number" step="0.01" />
        </label>

        <button id="autoStretchButton" type="button">Auto</button>
        <button id="reliefToggle" type="button" aria-pressed="true">Relief</button>
        <button id="gridToggle" type="button" aria-pressed="true">Grid</button>
        <button id="axesToggle" type="button" aria-pressed="false" title="Show HEALPix/geographic XYZ axes">Axes</button>
        <button id="viewPanelToggle" type="button" aria-pressed="true">View</button>
        <label class="toolbar-check" title="Copy active camera changes to the other pane">
          <input id="linkCameraToggle" type="checkbox" />
          <span>Camera</span>
        </label>
        <label class="toolbar-check" title="Use the active pane dataset in both panes">
          <input id="linkDatasetToggle" type="checkbox" />
          <span>Dataset</span>
        </label>
        <label class="toolbar-check" title="Copy active colormap, scale, min, and max to the other pane">
          <input id="linkColorScaleToggle" type="checkbox" />
          <span>Color</span>
        </label>
        <label class="toolbar-check" title="Draw the right pane footprint on the left globe">
          <input id="showFootprintToggle" type="checkbox" />
          <span>Footprint</span>
        </label>
        <label class="toolbar-color" title="Footprint outline color">
          <span>Outline</span>
          <input id="footprintColorInput" type="color" value="#000000" />
        </label>
        <label class="toolbar-check" title="Use left as overview and right as detail">
          <input id="overviewModeToggle" type="checkbox" />
          <span>Overview</span>
        </label>
        <button id="resetViewButton" type="button">Reset</button>
      </section>

      <section class="view-panel" aria-label="view state">
        <div class="panel-head">
          <span>View</span>
          <div>
            <button id="copyViewButton" type="button" title="Copy the current view state as JSON">Copy JSON</button>
            <button id="copyUrlButton" type="button" title="Copy a URL that restores the current view">Copy URL</button>
            <button id="copyPythonButton" type="button" title="Copy a Jupyter Viewer snippet for this view">Copy Python</button>
          </div>
        </div>
        <p id="viewStatus" class="view-status" aria-live="polite"></p>
        <dl>
          <div><dt>Camera XYZ (display)</dt><dd id="cameraPositionValue">-</dd></div>
          <div><dt>Target XYZ (display)</dt><dd id="cameraTargetValue">-</dd></div>
          <div><dt>Center Lon/Lat</dt><dd id="viewCenterValue">-</dd></div>
          <div><dt>Vector XYZ (Z-up)</dt><dd id="viewVectorValue" title="Surface center in display XYZ; +Z is north">-</dd></div>
        </dl>
        <div class="view-fields">
          <label>Lon<input id="viewLonInput" type="number" step="0.0001" /></label>
          <label>Lat<input id="viewLatInput" type="number" step="0.0001" /></label>
          <label>Distance<input id="viewDistanceInput" type="number" step="0.001" /></label>
          <label>FOV<input id="viewFovInput" type="number" step="0.1" min="1" max="179.9" /></label>
        </div>
        <div class="view-toggles">
          <label class="check-field" title="Keep local geographic north upward">
            <input id="northUpToggle" type="checkbox" />
            <span>North</span>
          </label>
          <label class="check-field" title="Show longitude/latitude guide lines">
            <input id="graticuleToggle" type="checkbox" />
            <span>Graticule</span>
          </label>
          <label class="check-field" title="Show approximate Earth-equivalent scale bar">
            <input id="scaleBarToggle" type="checkbox" />
            <span>Scale</span>
          </label>
        </div>
        <div class="view-actions">
          <button id="applyJsonButton" type="button">Apply JSON</button>
          <button id="loadViewStateButton" type="button" title="Load a saved view_state.json file">Load JSON</button>
          <button id="exportMetadataButton" type="button" title="Save the current view state as a JSON file">Save JSON</button>
          <button id="openExportButton" type="button">Save Image</button>
          <input id="viewStateFileInput" type="file" accept="application/json,.json" hidden />
        </div>
        <textarea id="viewJsonInput" rows="4" spellcheck="false" aria-label="view JSON"></textarea>
      </section>

      <section id="exportDialog" class="export-dialog" aria-label="export image options" hidden>
        <div class="panel-head">
          <span>Export Image</span>
          <button id="exportCancelButton" type="button">Cancel</button>
        </div>
        <label>
          File name
          <input id="exportFilenameInput" type="text" spellcheck="false" />
        </label>
        <div class="export-dialog-grid">
          <label>
            Format
            <select id="exportFormatSelect">
              <option value="png">PNG</option>
              <option value="jpg">JPG</option>
            </select>
          </label>
          <label>
            Target
            <select id="exportDialogModeSelect">
              <option value="active">Active pane</option>
              <option value="left">Left / top pane</option>
              <option value="right">Right / bottom pane</option>
              <option value="split">Split panes</option>
            </select>
          </label>
          <label>
            Scale
            <select id="exportDialogScaleSelect">
              <option value="1">1x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
            </select>
          </label>
          <label>
            Width
            <input id="exportDialogWidthInput" type="number" min="64" step="1" placeholder="auto" />
          </label>
          <label>
            Height
            <input id="exportDialogHeightInput" type="number" min="64" step="1" placeholder="auto" />
          </label>
        </div>
        <div class="export-dialog-actions">
          <label class="check-field">
            <input id="exportDialogMetadataToggle" type="checkbox" checked />
            <span>Embed metadata</span>
          </label>
          <label class="check-field">
            <input id="exportDialogTransparentToggle" type="checkbox" />
            <span>Transparent PNG</span>
          </label>
          <button id="exportSaveButton" type="button">Save</button>
        </div>
        <p id="exportStatus" class="export-status" aria-live="polite"></p>
      </section>

      <section class="inspector" aria-label="cell inspector">
        <div class="inspector-head">
          <span>Inspector</span>
          <strong id="loadStatus">0 tiles</strong>
        </div>
        <dl>
          <div><dt>Cell</dt><dd id="cellValue">-</dd></div>
          <div><dt>Face</dt><dd id="faceValue">-</dd></div>
          <div><dt>Local</dt><dd id="localValue">-</dd></div>
          <div><dt>Lon/Lat</dt><dd id="lonLatValue">-</dd></div>
          <div><dt>Value</dt><dd id="sampleValue">-</dd></div>
          <div><dt>Tile</dt><dd id="tileValue">-</dd></div>
        </dl>
      </section>

      <section class="colorbar" aria-label="colorbar">
        <div id="colorbarRamp" class="colorbar-ramp"></div>
        <div class="colorbar-labels">
          <span id="colorMin">-</span>
          <span id="colorMax">-</span>
        </div>
      </section>

      <section class="scale-bar" aria-label="scale bar">
        <div id="scaleBarLine" class="scale-bar-line"></div>
        <strong id="scaleBarValue">-</strong>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
